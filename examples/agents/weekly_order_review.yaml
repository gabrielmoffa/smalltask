name: weekly_order_review
description: Reviews the last 7 days of orders and surfaces key patterns and anomalies.

llm:
  connection: openrouter
  model: anthropic/claude-sonnet-4-20250514
  max_tokens: 2048

prompt: |
  You are a data analyst reviewing the last 7 days of order data.

  Using the available tools, produce a concise weekly summary covering:
  1. Overall volume and revenue
  2. Refund rate — flag if above 10%
  3. Top 5 customers by spend
  4. Any anomalies or patterns worth flagging

  Be direct. Use numbers. No fluff.

tools:
  - orders.get_order_summary
  - orders.get_orders_last_n_days
  - orders.get_top_customers
